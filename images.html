<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dorcas Logo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px 20px;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 20px;
      opacity: 0.95;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <img src="images/dorcas-earth-bright.png" alt="Dorcas Logo" class="logo">
  <h1>Dorcas</h1>
  <p>A steady, adaptive awareness system designed to understand context, rhythm, and human needs—without pretending to be a person.</p>
</body>
</html>
